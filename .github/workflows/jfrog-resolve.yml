name: Manual JFrog Resolve

on:
  workflow_dispatch:

jobs:
  resolve-dependencies:
    runs-on: ubuntu-latest

    env:
      JF_URL: ${{ secrets.JF_URL }}
      JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

    steps:
      - name: Check out spring-petclinic-jfrog
        uses: actions/checkout@v4
        with:
          repository: comedymoment/spring-petclinic-jfrog
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Configure JFrog CLI (Access Token)
        run: |
          jf c add my-server \
            --url "$JF_URL" \
            --access-token "$JF_ACCESS_TOKEN" \
            --interactive=false \
            --overwrite=true

      - name: Configure Maven for JFrog
        run: |
          jf mvn-config \
            --server-id-resolve my-server \
            --repo-resolve-releases maven-virtual \
            --repo-resolve-snapshots maven-virtual \
            --use-wrapper=false

      - name: Resolve dependencies via JFrog Artifactory
        run: |
          jf mvn dependency:resolve
