name: Manual JFrog Resolve

on:
  workflow_dispatch:

jobs:
  resolve-dependencies:
    runs-on: ubuntu-latest

    env:
      JF_URL: ${{ secrets.JF_URL }}
      JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      JF_USER: ${{ secrets.JF_USER }}
      JF_PASSWORD: ${{ secrets.JF_PASSWORD }}

    steps:
      - name: Check out spring-petclinic-jfrog
        uses: actions/checkout@v4
        with:
          repository: comedymoment/spring-petclinic-jfrog
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Validate JF_URL and JF credentials
        run: |
          set -euo pipefail
          CLEAN_JF_URL="$(printf '%s' "$JF_URL" | tr -d '\r\n')"
          CLEAN_JF_USER="$(printf '%s' "$JF_USER" | tr -d '\r\n')"
          CLEAN_JF_PASSWORD="$(printf '%s' "$JF_PASSWORD" | tr -d '\r\n')"

          echo "CLEAN_JF_URL=$CLEAN_JF_URL" >> "$GITHUB_ENV"
          echo "CLEAN_JF_USER=$CLEAN_JF_USER" >> "$GITHUB_ENV"
          echo "CLEAN_JF_PASSWORD=$CLEAN_JF_PASSWORD" >> "$GITHUB_ENV"

      - name: Configure JFrog server (username + password)
        run: |
          jf c add my-server \
            --url "$CLEAN_JF_URL" \
            --user "$CLEAN_JF_USER" \
            --password "$CLEAN_JF_PASSWORD" \
            --interactive=false \
            --overwrite=true

      - name: Configure Maven with JFrog
        run: |
          jf mvn-config \
            --server-id-resolve my-server \
            --server-id-deploy my-server \
            --repo-resolve-releases maven-virtual \
            --repo-resolve-snapshots maven-virtual

      - name: Resolve dependencies via JFrog Artifactory
        run: |
          jf mvn dependency:resolve

