name: Manual JFrog Resolve

on:
  workflow_dispatch:

jobs:
  resolve-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Check out spring-petclinic
        uses: actions/checkout@v4
        with:
          repository: comedymoment/spring-petclinic
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Debug JFrog env vars
        run: |
          echo "JF_URL: $JF_URL"
          echo "JF_ACCESS_TOKEN length: ${#JF_ACCESS_TOKEN}"

      - name: Configure JFrog server
        run: |
          jf c add my-server \
            --url $JF_URL \
            --access-token $JF_ACCESS_TOKEN \
            --interactive=false

      - name: Configure Maven with JFrog
        run: |
          jf mvn-config \
             --server-id-resolve my-server \
             --server-id-deploy my-server \
             --repo-resolve-releases maven-virtual \
             --repo-resolve-snapshots maven-virtual \
             --repo-deploy-releases releases-repo \
             --repo-deploy-snapshots snapshots-repo

      - name: Resolve dependencies via JFrog Artifactory
        run: |
          jf mvn dependency:resolve
