name: spring-petclinic-ci

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JF_BUILD_NAME: spring-petclinic-ci
      JF_BUILD_NUMBER: ${{ github.run_number }}

    steps:
      # 1. Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Install and configure JFrog CLI (best practice)
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_USER: ${{ secrets.JF_USER }}
          JF_PASSWORD: ${{ secrets.JF_PASSWORD }}

      # 4. Configure Maven to resolve dependencies through JFrog
      - name: Configure Maven for JFrog
        run: |
          jf mvn-config \
            --server-id-resolve=artifactory-server \
            --server-id-deploy=artifactory-server \
            --repo-resolve-releases=maven-virtual \
            --repo-resolve-snapshots=maven-virtual \
            --repo-deploy-releases=libs-release-local \
            --repo-deploy-snapshots=libs-snapshot-local \
            --use-wrapper=false

      # 5. Build project with Maven via JFrog (dependency resolution through Artifactory)
      - name: Build with Maven via JFrog
        run: |
          jf mvn clean package \
            --build-name=$JF_BUILD_NAME \
            --build-number=$JF_BUILD_NUMBER

      # 6. Publish build-info to Artifactory (required for Xray)
      - name: Publish build-info
        run: |
          jf rt build-publish $JF_BUILD_NAME $JF_BUILD_NUMBER

      # 7. Scan build with Xray (meets assignment requirement)
      - name: Xray scan build
        run: |
          jf rt build-scan $JF_BUILD_NAME $JF_BUILD_NUMBER --fail=false
