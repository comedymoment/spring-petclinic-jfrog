name: spring-petclinic-ci

on:
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    env:
      # JFrog URL and access token stored as GitHub Secrets
      JF_URL: ${{ secrets.JF_URL }}
      JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      # JFrog repositories (adjust names if yours differ)
      JF_MAVEN_VIRTUAL: maven-virtual
      JF_MAVEN_RELEASES: libs-release-local
      JF_MAVEN_SNAPSHOTS: libs-snapshot-local

      # Build metadata for JFrog (used for traceability)
      JF_BUILD_NAME: spring-petclinic-ci
      JF_BUILD_NUMBER: ${{ github.run_number }}

    steps:
      # 1. Check out source code
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Java for Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Install JFrog CLI
      - name: Install JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      # 4. Configure JFrog CLI with access token (best practice)
      - name: Configure JFrog CLI
        run: |
          jf c add my-server \
            --url "$JF_URL" \
            --access-token "$JF_ACCESS_TOKEN" \
            --interactive=false \
            --overwrite=true

      # 5. Configure Maven to resolve ONLY through JFrog (virtual repo)
      - name: Configure Maven for JFrog
        run: |
          jf mvn-config \
            --server-id-resolve=my-server \
            --repo-resolve-releases="$JF_MAVEN_VIRTUAL" \
            --repo-resolve-snapshots="$JF_MAVEN_VIRTUAL" \
            --use-wrapper=false

      # 6. Resolve dependencies and build the artifact (JAR) via JFrog
      #    Maven uses the settings.xml generated above, so all deps go through Artifactory.
      - name: Build with Maven (resolve via JFrog)
        run: |
          mvn -B clean package

      # 7. Upload the resulting JAR to Artifactory
      #    This publishes the artifact to your chosen release repo.
      - name: Publish JAR to JFrog Artifactory
        run: |
          # Adjust the pattern if your artifact name changes
          jf rt upload "target/*.jar" "$JF_MAVEN_RELEASES/spring-petclinic/${JF_BUILD_NUMBER}/" \
            --build-name="$JF_BUILD_NAME" \
            --build-number="$JF_BUILD_NUMBER"

      # 8. Scan build with Xray
      - name: Xray scan build
        run: |
          jf rt build-scan $JF_BUILD_NAME $JF_BUILD_NUMBER --fail=false
