name: CI_pipe1
on:
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    env:
      # JFrog URL and access token stored as GitHub Secrets
      JF_URL: ${{ secrets.JF_URL }}
      JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      # JFrog repositories (adjust names if yours differ)
      JF_MAVEN_VIRTUAL: uk1-maven-virtual
      JF_MAVEN_RELEASES: libs-release-local
      JF_MAVEN_SNAPSHOTS: libs-snapshot-local

      # Build metadata for JFrog
      JF_BUILD_NAME: spring-petclinic-ci
      JF_BUILD_NUMBER: ${{ github.run_number }}

    steps:
      # 1. Check out source code
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Java for Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Install JFrog CLI
      - name: Install JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      # 4. Configure JFrog CLI with access token
      - name: Configure JFrog CLI
        run: |
          jf c add my-server \
            --url "$JF_URL" \
            --access-token "$JF_ACCESS_TOKEN" \
            --interactive=false \
            --overwrite=true
            
      # 5. Configure Maven to resolve ONLY through JFrog
      - name: Configure Maven for JFrog
        run: |
          jf mvn-config \
            --server-id-resolve=my-server \
            --server-id-deploy=my-server \
            --repo-resolve-releases="$JF_MAVEN_VIRTUAL" \
            --repo-resolve-snapshots="$JF_MAVEN_VIRTUAL" \
            --repo-deploy-releases="$JF_MAVEN_RELEASES" \
            --repo-deploy-snapshots="$JF_MAVEN_SNAPSHOTS" \
            --use-wrapper=false

      # 6. Resolve dependencies, build and deploy the artifact (JAR) to JFrog
      - name: Build with Maven via JFrog
        run: |
          jf mvn clean deploy -Dmaven.test.skip=true \
            --build-name=$JF_BUILD_NAME \
            --build-number=$JF_BUILD_NUMBER

      # 7. Security Scan
      - name: Xray scan
        run: |
          jf audit --fail=false || true
